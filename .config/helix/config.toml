theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = true
scrolloff = 999
true-color = true
bufferline = "multiple"
popup-border = "all"
auto-format = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
display-progress-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = ""

[keys.normal]
C-s = ":w"
C-w = ":buffer-close"
C-v = [":clipboard-paste-after"]
esc = [
    "collapse_selection",
    "keep_primary_selection",
]
